# CI for bsv58 — Zeta implementation (main branch)
# Triggers: Push/PR to main
# Rust CI (for crates.io publishing) lives on the `rust` branch.
name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    name: Zeta Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Zeta compiler
        run: |
          curl -L -o /tmp/zetac https://github.com/murphsicles/zeta/releases/download/v1.0.17/zetac
          chmod +x /tmp/zetac
          sudo mv /tmp/zetac /usr/local/bin/zetac
      - name: Check bsv58.z syntax
        run: zetac src/bsv58.z --check
