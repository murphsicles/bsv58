# Publish — Zeta branch (main)
# This branch contains pure Zeta code. Publishing to crates.io
# is handled by the `rust` branch. See README.md for details.
name: Publish
on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify Zeta Release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag is NOT on rust branch (Zeta releases on main only)
        run: |
          TAG_BRANCH=$(git branch -r --contains tags/${{ github.ref_name }} | head -1 || echo "none")
          echo "Tag ${{ github.ref_name }} is on branch: $TAG_BRANCH"
          if [[ "$TAG_BRANCH" == *"rust"* ]]; then
            echo "ERROR: Rust crate tags should be pushed on the 'rust' branch, not 'main'."
            exit 1
          fi
          echo "Zeta release ${{ github.ref_name }} verified."
